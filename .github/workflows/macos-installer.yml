name: macOS Installer (.pkg)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pkg:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Qt6 (universal frameworks via aqtinstall)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia qtserialport'

      - name: Install build tools
        run: brew install ninja autoconf automake libtool

      - name: Generate .icns from PNG
        run: |
          mkdir -p AetherSDR.iconset
          sips -z 16 16     docs/logo-circle.png --out AetherSDR.iconset/icon_16x16.png
          sips -z 32 32     docs/logo-circle.png --out AetherSDR.iconset/icon_16x16@2x.png
          sips -z 32 32     docs/logo-circle.png --out AetherSDR.iconset/icon_32x32.png
          sips -z 64 64     docs/logo-circle.png --out AetherSDR.iconset/icon_32x32@2x.png
          sips -z 128 128   docs/logo-circle.png --out AetherSDR.iconset/icon_128x128.png
          sips -z 256 256   docs/logo-circle.png --out AetherSDR.iconset/icon_128x128@2x.png
          sips -z 256 256   docs/logo-circle.png --out AetherSDR.iconset/icon_256x256.png
          sips -z 512 512   docs/logo-circle.png --out AetherSDR.iconset/icon_256x256@2x.png
          sips -z 512 512   docs/logo-circle.png --out AetherSDR.iconset/icon_512x512.png
          sips -z 768 768   docs/logo-circle.png --out AetherSDR.iconset/icon_512x512@2x.png
          iconutil -c icns AetherSDR.iconset -o docs/AetherSDR.icns

      # ── Build main app (universal binary) ────────────────────────────────
      - name: Configure AetherSDR
        run: |
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"

      - name: Build AetherSDR
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Bundle Qt frameworks
        run: macdeployqt build/AetherSDR.app -verbose=1 -always-overwrite

      # ── Build HAL plugin (universal binary) ──────────────────────────────
      - name: Configure HAL plugin
        run: |
          cmake -B build-hal -S hal-plugin \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"

      - name: Build HAL plugin
        run: cmake --build build-hal -j$(sysctl -n hw.ncpu)

      - name: Verify builds
        run: |
          echo "=== AetherSDR.app ==="
          file build/AetherSDR.app/Contents/MacOS/AetherSDR
          lipo -info build/AetherSDR.app/Contents/MacOS/AetherSDR
          echo ""
          echo "=== AetherSDRDAX.driver ==="
          file build-hal/AetherSDRDAX.driver/Contents/MacOS/AetherSDRDAX
          lipo -info build-hal/AetherSDRDAX.driver/Contents/MacOS/AetherSDRDAX

      # ── Ad-hoc sign ──────────────────────────────────────────────────────
      - name: Ad-hoc sign app and plugin
        run: |
          codesign --force --deep --sign - build/AetherSDR.app
          codesign --force --deep --sign - build-hal/AetherSDRDAX.driver

      # ── Package as .pkg installer ────────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          VER=$(grep 'project(AetherSDR' CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "0.0.0")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Version: $VER"

      - name: Stage installer components
        run: |
          mkdir -p pkg-staging/app pkg-staging/hal pkg-staging/scripts pkg-staging/resources

          cp -R build/AetherSDR.app pkg-staging/app/
          cp -R build-hal/AetherSDRDAX.driver pkg-staging/hal/

          # postinstall: restart CoreAudio so virtual device appears
          cat > pkg-staging/scripts/postinstall << 'EOF'
          #!/bin/bash
          launchctl kickstart -kp system/com.apple.audio.coreaudiod 2>/dev/null || true
          exit 0
          EOF
          chmod +x pkg-staging/scripts/postinstall

          # Welcome page
          cat > pkg-staging/resources/welcome.html << 'EOF'
          <html><body>
          <h1>AetherSDR</h1>
          <p>A native SmartSDR client for FlexRadio on macOS.</p>
          <p>This installer includes:</p>
          <ul>
          <li><b>AetherSDR.app</b> — the main application</li>
          <li><b>DAX Virtual Audio Driver</b> — virtual audio devices for digital mode apps (WSJT-X, fldigi, VARA, etc.)</li>
          </ul>
          <p>After installation, the CoreAudio daemon will restart automatically.</p>
          </body></html>
          EOF

      - name: Build component packages
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pkgbuild \
            --root pkg-staging/app \
            --install-location /Applications \
            --identifier com.aethersdr.app \
            --version "$VERSION" \
            pkg-staging/AetherSDR-app.pkg

          pkgbuild \
            --root pkg-staging/hal \
            --install-location "/Library/Audio/Plug-Ins/HAL" \
            --identifier com.aethersdr.dax \
            --version "$VERSION" \
            --scripts pkg-staging/scripts \
            pkg-staging/AetherSDR-dax.pkg

      - name: Create distribution XML
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > pkg-staging/Distribution.xml << DISTXML
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>AetherSDR ${VERSION}</title>
              <welcome file="welcome.html"/>
              <options customize="allow" require-scripts="false"/>
              <script>
              function daxDriverInstalled() {
                  return system.files.fileExistsAtPath('/Library/Audio/Plug-Ins/HAL/AetherSDRDAX.driver');
              }
              function daxDriverNeedsUpdate() {
                  var plist = system.files.plistAtPath('/Library/Audio/Plug-Ins/HAL/AetherSDRDAX.driver/Contents/Info.plist');
                  if (plist) {
                      var installed = plist['CFBundleShortVersionString'] || '0';
                      return (installed !== '${VERSION}');
                  }
                  return true;
              }
              </script>
              <choices-outline>
                  <line choice="app"/>
                  <line choice="dax"/>
              </choices-outline>
              <choice id="app" title="AetherSDR Application"
                      description="SmartSDR-compatible client for FlexRadio">
                  <pkg-ref id="com.aethersdr.app"/>
              </choice>
              <choice id="dax" title="DAX Virtual Audio Driver"
                      description="Virtual audio devices for digital mode apps (WSJT-X, fldigi, etc.)"
                      selected="!daxDriverInstalled() || daxDriverNeedsUpdate()">
                  <pkg-ref id="com.aethersdr.dax"/>
              </choice>
              <pkg-ref id="com.aethersdr.app" version="${VERSION}" onConclusion="none">AetherSDR-app.pkg</pkg-ref>
              <pkg-ref id="com.aethersdr.dax" version="${VERSION}" onConclusion="none">AetherSDR-dax.pkg</pkg-ref>
          </installer-gui-script>
          DISTXML

      - name: Build product installer
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          productbuild \
            --distribution pkg-staging/Distribution.xml \
            --resources pkg-staging/resources \
            --package-path pkg-staging \
            "AetherSDR-${VERSION}-macOS-universal.pkg"

          ls -lh AetherSDR-*.pkg

      # ── Upload / Release ─────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macOS-Installer
          path: AetherSDR-*.pkg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AetherSDR-*.pkg
