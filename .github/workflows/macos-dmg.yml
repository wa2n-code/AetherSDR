name: macOS DMG

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (universal frameworks via aqtinstall)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia qtserialport'

      - name: Install build tools
        run: brew install ninja create-dmg autoconf automake libtool

      - name: Generate .icns from PNG
        run: |
          mkdir -p AetherSDR.iconset
          sips -z 16 16     docs/logo-circle.png --out AetherSDR.iconset/icon_16x16.png
          sips -z 32 32     docs/logo-circle.png --out AetherSDR.iconset/icon_16x16@2x.png
          sips -z 32 32     docs/logo-circle.png --out AetherSDR.iconset/icon_32x32.png
          sips -z 64 64     docs/logo-circle.png --out AetherSDR.iconset/icon_32x32@2x.png
          sips -z 128 128   docs/logo-circle.png --out AetherSDR.iconset/icon_128x128.png
          sips -z 256 256   docs/logo-circle.png --out AetherSDR.iconset/icon_128x128@2x.png
          sips -z 256 256   docs/logo-circle.png --out AetherSDR.iconset/icon_256x256.png
          sips -z 512 512   docs/logo-circle.png --out AetherSDR.iconset/icon_256x256@2x.png
          sips -z 512 512   docs/logo-circle.png --out AetherSDR.iconset/icon_512x512.png
          sips -z 768 768   docs/logo-circle.png --out AetherSDR.iconset/icon_512x512@2x.png
          iconutil -c icns AetherSDR.iconset -o docs/AetherSDR.icns

      - name: Configure (universal binary)
        run: |
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Verify universal binary
        run: |
          echo "=== Architecture check ==="
          file build/AetherSDR.app/Contents/MacOS/AetherSDR
          lipo -info build/AetherSDR.app/Contents/MacOS/AetherSDR

      - name: Bundle Qt frameworks
        run: |
          macdeployqt build/AetherSDR.app \
            -verbose=1 \
            -always-overwrite

      - name: Import code signing certificate
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          # Decode certificate
          echo "$APPLE_CERT_BASE64" | base64 --decode > cert.p12
          # Create temporary keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          # Import certificate
          security import cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm cert.p12

      - name: Code sign application
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Sign all frameworks and dylibs first, then the app bundle
          find build/AetherSDR.app -name "*.dylib" -o -name "*.framework" -type d | while read item; do
            codesign --force --options runtime --timestamp \
              --sign "Developer ID Application: ($APPLE_TEAM_ID)" "$item" 2>/dev/null || true
          done
          # Sign the main executable and app bundle
          codesign --force --deep --options runtime --timestamp \
            --sign "Developer ID Application: ($APPLE_TEAM_ID)" \
            build/AetherSDR.app
          # Verify
          codesign --verify --deep --strict build/AetherSDR.app
          echo "Code signing verified successfully"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "AetherSDR" \
            --volicon "docs/AetherSDR.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AetherSDR.app" 150 190 \
            --hide-extension "AetherSDR.app" \
            --app-drop-link 450 190 \
            "AetherSDR-${{ github.ref_name }}-macOS-universal.dmg" \
            "build/AetherSDR.app" \
          || true  # create-dmg returns 2 on success with no code sign

      - name: Sign DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --timestamp \
            --sign "Developer ID Application: ($APPLE_TEAM_ID)" \
            AetherSDR-${{ github.ref_name }}-macOS-universal.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            AetherSDR-${{ github.ref_name }}-macOS-universal.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600
          # Staple the notarization ticket to the DMG
          xcrun stapler staple \
            AetherSDR-${{ github.ref_name }}-macOS-universal.dmg
          echo "Notarization and stapling complete"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: AetherSDR-*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AetherSDR-*.dmg
