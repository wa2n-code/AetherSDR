name: Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure
        run: |
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

      - name: Deploy Qt
        run: |
          mkdir deploy
          copy build\AetherSDR.exe deploy\
          windeployqt deploy\AetherSDR.exe --release --no-translations --no-system-d3d-compiler
          if (Test-Path "third_party\fftw3\bin\libfftw3-3.dll") {
            copy third_party\fftw3\bin\libfftw3-3.dll deploy\
          }

      - name: Create installer (ZIP)
        run: |
          Compress-Archive -Path deploy\* -DestinationPath "AetherSDR-${{ github.ref_name }}-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: AetherSDR-*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AetherSDR-*.zip
